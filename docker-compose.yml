version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: dispharma-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: dispharma
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dispharma-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/dispharma
      NODE_ENV: production
      JWT_SECRET: super_secret_jwt_key_dispharma_2026
    depends_on:
      - mongodb

volumes:
  mongo-data:
