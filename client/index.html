<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>DisPharma — India's Inter-Pharmacy Network</title>
    <meta name="description" content="DisPharma connects Indian pharmacies in real time. Search medicines across nearby stores, manage stock, generate bills with a 4% referral margin, and grow your pharmacy network." />
    <meta name="robots" content="index, follow, noarchive" />
    <meta name="keywords" content="pharmacy network India, inter-pharmacy, medicine search, pharmacy billing, stock management, DisPharma" />
    <link rel="canonical" href="https://dispharma.in/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dispharma.in/" />
    <meta property="og:title" content="DisPharma — India's Inter-Pharmacy Network" />
    <meta property="og:description" content="Connect with nearby pharmacies, search real-time stock, and earn a 4% referral margin. India's leading inter-pharmacy platform." />
    <meta property="og:image" content="/logo.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DisPharma — India's Inter-Pharmacy Network" />
    <meta name="twitter:description" content="Connect with nearby pharmacies, search medicines, and earn referral margins." />

    <!-- Schema.org Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "DisPharma",
      "url": "https://dispharma.in/",
      "description": "India's Leading Inter-Pharmacy Network for real-time stock searching and B2B pharmacy billing.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "All",
      "author": {
        "@type": "Organization",
        "name": "DisPharma India"
      }
    }
    </script>

    <!-- Google Fonts — preconnect first, then stylesheet (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light-mode');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
